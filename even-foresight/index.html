<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foresight</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0a0a0a;
        color: #e0e0e0;
        min-height: 100vh;
      }
      #phone-ui {
        display: none;
        padding: 24px;
        max-width: 480px;
        margin: 0 auto;
      }
      #phone-ui.active { display: block; }
      #glasses-mode { display: none; }
      .header {
        text-align: center;
        padding: 32px 0 24px;
      }
      .header h1 {
        font-size: 28px;
        font-weight: 700;
        color: #ffffff;
        margin-bottom: 4px;
      }
      .header p {
        font-size: 13px;
        color: #666;
      }
      .card {
        background: #1a1a1a;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .card h2 {
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 12px;
      }
      .card label {
        display: block;
        font-size: 13px;
        color: #888;
        margin-bottom: 6px;
      }
      .card input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #333;
        background: #0a0a0a;
        color: #fff;
        font-size: 16px;
        outline: none;
      }
      .card input:focus {
        border-color: #00cc66;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        border: none;
        background: #00cc66;
        color: #000;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 16px;
      }
      .btn:disabled {
        background: #333;
        color: #666;
        cursor: not-allowed;
      }
      .status {
        text-align: center;
        padding: 12px;
        font-size: 13px;
        color: #00cc66;
      }
      .status.error { color: #ff4444; }
    </style>
  </head>
  <body>
    <!-- Phone UI (shown when no glasses bridge) -->
    <div id="phone-ui">
      <div class="header">
        <h1>Foresight</h1>
        <p>by wKey Industries</p>
      </div>

      <div class="card" id="setup-card">
        <h2>Setup</h2>
        <label for="username-input">Your Name</label>
        <input type="text" id="username-input" placeholder="Enter your name" maxlength="30" autocomplete="off" />
        <button class="btn" id="save-btn" disabled>Save & Connect</button>
      </div>

      <div id="status-msg" class="status"></div>
    </div>

    <!-- Glasses mode (hidden, runs SDK logic) -->
    <div id="glasses-mode"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
